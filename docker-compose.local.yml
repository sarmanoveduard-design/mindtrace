services:
  mindtrace-redis:
    image: redis:7-alpine
    container_name: mindtrace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
  mindtrace-postgres:
    image: postgres:16-alpine
    container_name: mindtrace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindtrace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mindtrace_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mindtrace"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mindtrace_postgres_data:
